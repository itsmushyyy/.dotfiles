# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~ #
#		orphic's Tmux config	#
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~ #

### General Settings
set -g prefix C-a
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g display-time 2000
set -s escape-time 0
set -g focus-events on

### Keybindings
bind Escape copy-mode
bind p paste-buffer
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"

### Keybindings
bind ! split-window -h -c "#{pane_current_path}"	# Split horizontally
bind - split-window -v -c "#{pane_current_path}"	# Split vertically
bind n new-window                               	# Open new window
bind x kill-pane                                	# Kill pane without confirmation
bind k kill-window                              	# Kill window
bind q kill-session                             	# Kill session
bind r source-file ~/.tmux.conf                 	# Reload tmux config
bind t select-layout tiled                      	# Tiled layout

### Status Bar
set -g status on
set -g status-interval 1
set -g status-justify left
set -g status-position top
set -g status-style "bg=#000000,fg=#ffffff"

# Status Left: Session
set -g status-left-length 30
set -g status-left "#[bg=#000000,fg=#ffffff,bold] #S #[bg=#000000,fg=#444444]│ "

# Status Right: Time & Date
set -g status-right-length 50
set -g status-right "#[bg=#000000,fg=#444444]│#[bg=#000000,fg=#ffffff] %H:%M #[bg=#000000,fg=#444444]│#[bg=#000000,fg=#ffffff] %Y-%m-%d "

# Window Status
set -g window-status-format "#[bg=#000000,fg=#666666] #I #[bg=#000000,fg=#444444]│#[bg=#000000,fg=#666666] #W "
set -g window-status-current-format "#[bg=#000000,fg=#ffffff,bold] #I #[bg=#000000,fg=#444444]│#[bg=#000000,fg=#ffffff,bold] #W "
set -g window-status-separator ""

# Pane Borders - Squared
set -g pane-border-style "fg=#222222"
set -g pane-active-border-style "fg=#ffffff"
set -g pane-border-lines heavy

# Message Style
set -g message-style "bg=#000000,fg=#ffffff,bold"
set -g message-command-style "bg=#000000,fg=#ffffff"

# Mode Style (copy mode, etc)
set -g mode-style "bg=#222222,fg=#ffffff"

# Clock
setw -g clock-mode-colour "#ffffff"
setw -g clock-mode-style 24

